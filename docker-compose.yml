# ============================================================
# docker-compose.yml — Works on Coolify (Hostinger) and AWS
# 3 services: app, workers, db, redis
# ============================================================

version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.${NODE_ENV:-production}
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "sentry.environment=${NODE_ENV}"
    networks:
      - nxbook-net

  workers:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    command: ["node", "dist/workers/index.js"]
    env_file:
      - .env.${NODE_ENV:-production}
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE=workers
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nxbook-net

  db:
    image: postgres:16-alpine
    ports:
      # Host 5433 → container 5432 (host 5432 is used by another local project).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nxbook-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      # Lets redis-cli (and the healthcheck) authenticate without leaking the
      # password on the command line.
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    ports:
      # Host 6380 → container 6379 (host 6379 is used by another local project).
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDISCLI_AUTH\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nxbook-net

volumes:
  pgdata:
  redisdata:

networks:
  nxbook-net:
    driver: bridge
